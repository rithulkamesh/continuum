name: ci

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install --index-url https://download.pytorch.org/whl/cpu torch
      - run: pip install scikit-build-core pybind11
      - run: CMAKE_ARGS="-DCONTINUUM_USE_CURL=OFF" pip install --no-build-isolation -e ".[dev,test]"
      - run: ruff check python tests
      - run: mypy python/continuum
      - run: pytest

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y doxygen graphviz
      - run: python -m pip install --upgrade pip
      - run: pip install sphinx furo breathe
      - run: sphinx-build -b html docs/api/python docs/api/python/_build
      - run: doxygen Doxyfile
