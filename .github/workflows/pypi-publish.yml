name: pypi-publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install build
      - run: pip install scikit-build-core pybind11
      - run: pip install --index-url https://download.pytorch.org/whl/cpu torch
      - run: python -m build --sdist --no-isolation
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  install-validation:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: |
          for i in 1 2 3 4 5 6; do
            if pip install --no-cache-dir --index-url https://pypi.org/simple --no-binary continuum-ai continuum-ai; then
              exit 0
            fi
            echo "PyPI package not visible yet (attempt $i), retrying..."
            sleep 20
          done
          echo "Failed to install continuum-ai from PyPI after retries."
          exit 1
      - run: python -c "import continuum; print('ok')"
      - run: python -c "import continuum._native"
